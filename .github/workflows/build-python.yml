name: Build — Python wheel
on:
  push:
    branches: [main]
    paths:
      - "src/python/**"
      - "pyproject.toml"
      - ".github/workflows/build-python.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "src/python/**"
      - "pyproject.toml"
      - ".github/workflows/build-python.yml"

jobs:
  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Build
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pymcu-plugin-sdk-dist
          path: dist/
          if-no-files-found: error
          retention-days: 30

  publish-private:
    name: Publish to private PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_type == 'branch'
    permissions:
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: pymcu-plugin-sdk-dist
          path: dist/

      - name: Connect to headscale network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.HEADSCALE_AUTH_KEY }}
          args: --login-server ${{ secrets.HEADSCALE_URL }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to private registry (Gitea)
        run: |
          uv publish \
            --publish-url "${{ secrets.PRIVATE_PYPI_URL }}" \
            --username "${{ secrets.PRIVATE_PYPI_USERNAME }}" \
            --password "${{ secrets.PRIVATE_PYPI_TOKEN }}"

  publish-public:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_type == 'tag'
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: pymcu-plugin-sdk-dist
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
